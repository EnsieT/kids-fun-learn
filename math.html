<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Math | सरल गणित</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    .math-expression {
      flex-direction: column;
      gap: 8px;
    }
    .math-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 2rem;
      flex-wrap: wrap;
    }
    .math-op {
      color: var(--deep-saffron);
      font-weight: 700;
    }
    .math-equals {
      color: var(--blue);
      font-weight: 700;
    }
    .math-unknown {
      width: 56px;
      height: 56px;
      background: white;
      border: 3px dashed var(--blue);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 700;
      animation: pulse 1.2s infinite;
    }
    .choices-grid {
      grid-template-columns: repeat(4, 1fr);
    }
    @media (max-width: 380px) {
      .choices-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <a href="index.html" class="home-btn" aria-label="Home">🏠</a>
    <h1>➕ सरल गणित<br><small style="font-size:0.8em">Simple Math</small></h1>
    <div style="width:48px"></div>
  </div>

  <div class="container">

    <!-- Setup -->
    <div id="setupScreen">
      <div class="card text-center">
        <p style="font-size:1.2rem;font-weight:700;margin-bottom:16px">Choose Age / उम्र चुनें:</p>
        <div class="age-selector">
          <button class="age-btn active" data-age="4">Age 4<br><small>Add up to 5</small></button>
          <button class="age-btn" data-age="5">Age 5<br><small>Add up to 10</small></button>
          <button class="age-btn" data-age="6">Age 6<br><small>Add &amp; Subtract</small></button>
        </div>
        <button class="btn btn-primary mt-16" id="startBtn">🚀 Start!</button>
      </div>
    </div>

    <!-- Game -->
    <div id="gameScreen" class="hidden">
      <div class="score-bar">
        <span class="score-label">Round <span id="roundNum">1</span> / <span id="totalRounds">8</span></span>
        <div class="progress-dots" id="progressDots"></div>
        <span class="score-value">⭐ <span id="scoreDisplay">0</span></span>
      </div>

      <div class="math-expression">
        <div class="math-row" id="mathRow"></div>
        <div style="font-size:1rem;color:var(--text-medium);text-align:center" id="mathHint"></div>
      </div>

      <div class="choices-grid" id="choicesGrid" style="margin-top:20px;"></div>

      <div class="feedback-msg" id="feedbackMsg"></div>
    </div>

    <div id="endScreen" class="hidden"></div>

  </div>

  <script src="js/common.js"></script>
  <script>
    const ACTIVITY_ID = 'math';
    const TOTAL_ROUNDS = 8;

    const OBJECTS = ['🥭','🍌','🥥','🪔','🌺','⭐','🎈','🐠'];

    let selectedAge = 4;
    let currentRound = 0;
    let wrongCount = 0;
    let scoreTotal = 0;
    let correctAnswer = 0;
    let locked = false;
    let roundResults = [];
    let roundHadWrong = false;

    document.querySelectorAll('.age-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAge = parseInt(btn.dataset.age);
      });
    });

    document.getElementById('startBtn').addEventListener('click', startGame);

    function startGame() {
      currentRound = 0;
      wrongCount = 0;
      scoreTotal = 0;
      roundResults = [];
      locked = false;
      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('endScreen').classList.add('hidden');
      document.getElementById('gameScreen').classList.remove('hidden');
      document.getElementById('totalRounds').textContent = TOTAL_ROUNDS;
      buildProgressDots();
      nextRound();
    }

    function buildProgressDots() {
      const dots = document.getElementById('progressDots');
      dots.innerHTML = '';
      for (let i = 0; i < TOTAL_ROUNDS; i++) {
        const d = document.createElement('div');
        d.className = 'progress-dot' + (i === 0 ? ' current' : '');
        d.id = 'dot-' + i;
        dots.appendChild(d);
      }
    }

    function updateDot(round, correct) {
      const dot = document.getElementById('dot-' + round);
      if (dot) {
        dot.classList.remove('current');
        dot.classList.add(correct ? 'done-correct' : 'done-wrong');
      }
      const next = document.getElementById('dot-' + (round + 1));
      if (next) next.classList.add('current');
    }

    function makeEmojiGroup(emoji, count) {
      let s = '';
      for (let i = 0; i < count; i++) s += emoji;
      return `<span style="letter-spacing:2px">${s}</span>`;
    }

    function nextRound() {
      if (currentRound >= TOTAL_ROUNDS) { endGame(); return; }
      locked = false;
      roundHadWrong = false;
      document.getElementById('feedbackMsg').className = 'feedback-msg';
      document.getElementById('roundNum').textContent = currentRound + 1;

      const obj = OBJECTS[currentRound % OBJECTS.length];
      let a, b, op, maxNum, hint;

      if (selectedAge === 4) {
        // Addition only, sum ≤ 5
        maxNum = 5;
        a = randInt(1, 4);
        b = randInt(1, maxNum - a);
        op = '+';
        correctAnswer = a + b;
        hint = `${a} + ${b} = ?`;
      } else if (selectedAge === 5) {
        // Addition, sum ≤ 10
        maxNum = 10;
        a = randInt(1, 8);
        b = randInt(1, maxNum - a);
        op = '+';
        correctAnswer = a + b;
        hint = `${a} + ${b} = ?`;
      } else {
        // Addition up to 10 or subtraction
        maxNum = 10;
        const useSubtract = Math.random() > 0.4;
        if (useSubtract) {
          a = randInt(2, maxNum);
          b = randInt(1, a - 1);
          op = '−';
          correctAnswer = a - b;
          hint = `${a} − ${b} = ?`;
        } else {
          a = randInt(1, 8);
          b = randInt(1, maxNum - a);
          op = '+';
          correctAnswer = a + b;
          hint = `${a} + ${b} = ?`;
        }
      }

      // Math row: emoji groups + operator + result emoji groups + = + ?
      const row = document.getElementById('mathRow');
      if (op === '+') {
        row.innerHTML = `
          ${makeEmojiGroup(obj, a)}
          <span class="math-op">${op}</span>
          ${makeEmojiGroup(obj, b)}
          <span class="math-equals">=</span>
          <div class="math-unknown">?</div>
        `;
      } else {
        row.innerHTML = `
          ${makeEmojiGroup(obj, a)}
          <span class="math-op">${op}</span>
          ${makeEmojiGroup(obj, b)}
          <span class="math-equals">=</span>
          <div class="math-unknown">?</div>
        `;
      }
      document.getElementById('mathHint').textContent = hint;

      // Choices
      let choices = new Set([correctAnswer]);
      while (choices.size < 4) {
        let c = randInt(Math.max(0, correctAnswer - 3), Math.min(maxNum, correctAnswer + 3));
        if (c !== correctAnswer && c >= 0) choices.add(c);
      }
      choices = shuffle([...choices]);

      const grid = document.getElementById('choicesGrid');
      grid.innerHTML = '';
      choices.forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = num;
        btn.addEventListener('click', () => handleAnswer(btn, num));
        grid.appendChild(btn);
      });
    }

    function handleAnswer(btn, chosen) {
      if (locked) return;
      if (chosen === correctAnswer) {
        locked = true;
        showCorrectFeedback(btn);
        launchConfetti();
        showStarFloat(btn.getBoundingClientRect().left + 30, btn.getBoundingClientRect().top);
        scoreTotal++;
        document.getElementById('scoreDisplay').textContent = scoreTotal;
        roundResults.push(true);
        updateDot(currentRound, true);
        const fb = document.getElementById('feedbackMsg');
        fb.className = 'feedback-msg correct';
        fb.textContent = `✅ शाबाश! ${correctAnswer} सही है! Correct!`;
        currentRound++;
        setTimeout(nextRound, 1100);
      } else {
        if (!roundHadWrong) {
          wrongCount++;
          roundHadWrong = true;
        }
        showWrongFeedback(btn);
        const fb = document.getElementById('feedbackMsg');
        fb.className = 'feedback-msg wrong';
        fb.textContent = '❌ फिर से कोशिश करो! Try again!';
      }
    }

    function endGame() {
      document.getElementById('gameScreen').classList.add('hidden');
      const endEl = document.getElementById('endScreen');
      endEl.classList.remove('hidden');
      const stars = calculateStars(wrongCount, TOTAL_ROUNDS);
      const correct = roundResults.filter(Boolean).length;
      showEndScreen(endEl, stars, correct, TOTAL_ROUNDS, ACTIVITY_ID, () => {
        document.getElementById('endScreen').classList.add('hidden');
        document.getElementById('setupScreen').classList.remove('hidden');
      });
    }
  </script>
</body>
</html>
