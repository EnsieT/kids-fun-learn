<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jigsaw Puzzle 🧩 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
.jigsaw-container {
  max-width: 560px;
  margin: 0 auto;
  padding: 16px;
}

.scene-label {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 800;
  color: #666;
  margin-bottom: 8px;
}

.reference-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 16px;
}
.reference-caption {
  font-size: 0.85rem;
  font-weight: 700;
  color: #999;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.reference-grid {
  background: #fff;
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 8px;
  border: 3px solid var(--orange);
  display: inline-grid;
  gap: 4px;
}
.reference-cell {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  background: #FFF9C4;
  border-radius: 8px;
}

.section-label {
  text-align: center;
  font-size: 0.95rem;
  font-weight: 700;
  color: #888;
  margin: 10px 0 6px;
}

.puzzle-frame-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}
.puzzle-frame {
  display: inline-grid;
  gap: 8px;
  background: #fff;
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 12px;
  border: 3px dashed #ccc;
}
.puzzle-slot {
  width: 72px;
  height: 72px;
  border: 3px dashed #bbb;
  border-radius: 12px;
  background: #F5F5F5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  user-select: none;
}
.puzzle-slot:hover:not(.filled) {
  border-color: var(--blue);
  background: #E3F2FD;
  box-shadow: 0 0 0 3px rgba(33,150,243,0.25);
}
.puzzle-slot.filled {
  border-style: solid;
  border-color: var(--green);
  background: #E8F5E9;
  cursor: default;
  animation: pulse-correct 0.5s;
}
.puzzle-slot.wrong-slot {
  animation: shake 0.5s;
  border-color: var(--red);
  background: #FFEBEE;
}

.pieces-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  padding: 14px;
  background: #fff;
  border-radius: 16px;
  box-shadow: var(--shadow);
  max-width: 440px;
  margin: 0 auto;
  min-height: 92px;
}
.puzzle-piece {
  width: 72px;
  height: 72px;
  border: 3px solid #ddd;
  border-radius: 12px;
  background: #FFFDE7;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s, opacity 0.2s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  user-select: none;
}
.puzzle-piece:hover  { transform: scale(1.1); border-color: #bbb; }
.puzzle-piece:active { transform: scale(0.95); }
.puzzle-piece.selected {
  border-color: var(--blue);
  background: #E3F2FD;
  box-shadow: 0 0 0 4px rgba(33,150,243,0.35);
  transform: scale(1.1);
}
.puzzle-piece.placed {
  opacity: 0;
  pointer-events: none;
}

@keyframes slot-pop {
  0%   { transform: scale(0.7); }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.puzzle-slot.filled { animation: slot-pop 0.35s ease; }

@media (max-width: 480px) {
  .puzzle-slot,
  .puzzle-piece {
    width: 64px;
    height: 64px;
    font-size: 2rem;
  }
  .reference-cell {
    width: 38px;
    height: 38px;
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🧩 Jigsaw Puzzle</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/6</span>
</header>

<div id="game-area">
  <div class="jigsaw-container">

    <div id="feedback-banner" class="feedback-banner"></div>

    <div class="scene-label" id="scene-label">🧩 पहेली</div>

    <!-- Reference image -->
    <div class="reference-wrap">
      <div class="reference-caption">पूरी तस्वीर / Full Picture 👀</div>
      <div class="reference-grid" id="reference-grid"></div>
    </div>

    <!-- Puzzle frame -->
    <div class="section-label">खाली जगह भरो / Fill the blanks 🧩</div>
    <div class="puzzle-frame-wrap">
      <div class="puzzle-frame" id="puzzle-frame"></div>
    </div>

    <!-- Pieces bank -->
    <div class="section-label">टुकड़ा चुनो, फिर खाली जगह पर टैप करो / Pick a piece, then tap a slot 👇</div>
    <div class="pieces-bank" id="pieces-bank"></div>

  </div>
</div>

<!-- Completion Screen -->
<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars">⭐⭐⭐</div>
  <div class="completion-title" id="completion-title">शानदार! Excellent!</div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 फिर खेलो! Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const PUZZLES = [
  {
    name: 'गाँव / Village', cols: 2, rows: 2,
    emojis: ['🏠','🌳','🐄','☀️']
  },
  {
    name: 'दिवाली / Diwali', cols: 2, rows: 2,
    emojis: ['🪔','🎆','🌺','🏠']
  },
  {
    name: 'खेत / Farm', cols: 3, rows: 2,
    emojis: ['🌾','🚜','🐄','🌻','🌧️','🐓']
  },
  {
    name: 'समुद्र तट / Beach', cols: 3, rows: 2,
    emojis: ['🏖️','🌊','🐚','🦀','⛵','🌅']
  },
  {
    name: 'स्कूल / School', cols: 3, rows: 3,
    emojis: ['📚','✏️','🎒','📐','🖍️','✂️','🖊️','📏','🎨']
  },
  {
    name: 'त्योहार / Festival', cols: 3, rows: 3,
    emojis: ['🪔','🎆','🌺','🧨','🎁','🕯️','🥘','🎊','💫']
  },
];

const TOTAL_PUZZLES = PUZZLES.length;

let currentPuzzle = 0;
let totalMistakes  = 0;
let selectedBankPos = null;
let placedPieces = [];
let shuffledOrder = [];

function initGame() {
  currentPuzzle  = 0;
  totalMistakes  = 0;
  selectedBankPos = null;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();
  loadPuzzle();
}

function loadPuzzle() {
  if (currentPuzzle >= TOTAL_PUZZLES) {
    showCompletion('jigsaw', totalMistakes, TOTAL_PUZZLES);
    return;
  }

  selectedBankPos = null;
  const puzzle = PUZZLES[currentPuzzle];
  const total  = puzzle.emojis.length;

  placedPieces  = new Array(total).fill(false);
  shuffledOrder = shuffle(Array.from({length: total}, (_, i) => i));

  updateProgress(currentPuzzle, TOTAL_PUZZLES);
  hideFeedback();

  document.getElementById('scene-label').textContent =
    `पहेली ${currentPuzzle + 1}/${TOTAL_PUZZLES}: ${puzzle.name} 🧩`;

  // Reference grid
  const refGrid = document.getElementById('reference-grid');
  refGrid.style.gridTemplateColumns = `repeat(${puzzle.cols}, 1fr)`;
  refGrid.innerHTML = puzzle.emojis
    .map(e => `<div class="reference-cell">${e}</div>`)
    .join('');

  // Puzzle frame (empty slots)
  const frame = document.getElementById('puzzle-frame');
  frame.style.gridTemplateColumns = `repeat(${puzzle.cols}, 1fr)`;
  frame.innerHTML = puzzle.emojis
    .map((_, i) =>
      `<div class="puzzle-slot" id="slot-${i}" onclick="handleSlotClick(${i})"></div>`
    )
    .join('');

  renderBank();

  speakHindi('तस्वीर पूरी करो!');
}

function renderBank() {
  const puzzle = PUZZLES[currentPuzzle];
  const bank   = document.getElementById('pieces-bank');
  bank.innerHTML = shuffledOrder
    .map((pieceIdx, bankPos) => {
      const placed = placedPieces[pieceIdx] ? 'placed' : '';
      const sel    = selectedBankPos === bankPos ? 'selected' : '';
      return `<div class="puzzle-piece ${placed} ${sel}"
                   id="piece-${bankPos}"
                   onclick="handlePieceClick(${bankPos})">
                ${puzzle.emojis[pieceIdx]}
              </div>`;
    })
    .join('');
}

function handlePieceClick(bankPos) {
  const pieceIdx = shuffledOrder[bankPos];
  if (placedPieces[pieceIdx]) return;

  // Toggle deselect
  if (selectedBankPos === bankPos) {
    selectedBankPos = null;
    const el = document.getElementById(`piece-${bankPos}`);
    if (el) el.classList.remove('selected');
    return;
  }

  // Deselect previous
  if (selectedBankPos !== null) {
    const prev = document.getElementById(`piece-${selectedBankPos}`);
    if (prev) prev.classList.remove('selected');
  }

  selectedBankPos = bankPos;
  const el = document.getElementById(`piece-${bankPos}`);
  if (el) el.classList.add('selected');
}

function handleSlotClick(slotIdx) {
  if (selectedBankPos === null) {
    // Remind the kid to pick a piece first
    speakHindi('पहले एक टुकड़ा चुनो!');
    return;
  }
  if (placedPieces[slotIdx]) return;

  const puzzle   = PUZZLES[currentPuzzle];
  const pieceIdx = shuffledOrder[selectedBankPos];

  if (pieceIdx === slotIdx) {
    // Correct placement
    placedPieces[slotIdx] = true;
    const slot = document.getElementById(`slot-${slotIdx}`);
    slot.textContent = puzzle.emojis[pieceIdx];
    slot.classList.add('filled');
    slot.onclick = null;

    const pieceEl = document.getElementById(`piece-${selectedBankPos}`);
    if (pieceEl) pieceEl.classList.add('placed');
    selectedBankPos = null;

    speakHindi('सही!');
    hideFeedback();

    if (placedPieces.every(Boolean)) {
      launchConfetti();
      setTimeout(() => {
        currentPuzzle++;
        loadPuzzle();
      }, 1400);
    }
  } else {
    // Wrong slot
    totalMistakes++;
    const slot = document.getElementById(`slot-${slotIdx}`);
    slot.classList.add('wrong-slot');
    setTimeout(() => slot.classList.remove('wrong-slot'), 600);
    speakHindi('फिर से कोशिश करो!');

    const banner = document.getElementById('feedback-banner');
    banner.textContent = '❌ फिर से कोशिश करो! Try again!';
    banner.className = 'feedback-banner show wrong-fb';
    setTimeout(() => hideFeedback(), 1200);
  }
}

document.addEventListener('DOMContentLoaded', initGame);
</script>
</body>
</html>
