<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simple Math ➕ · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>➕ Simple Math</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/12</span>
</header>

<div id="langSelector" class="language-selector">
  <button class="lang-btn" data-lang="en">🇬🇧 En</button>
  <button class="lang-btn" data-lang="hi">🇮🇳 हि</button>
  <button class="lang-btn" data-lang="gu">🇮🇳 ગુ</button>
</div>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="question-text">जवाब क्या है? What is the answer?</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <div class="math-equation" id="math-equation"></div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="choices-grid" id="choices-grid"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const MATH_OBJECTS = ['🥭','🍌','🥥','🍐','🍎','🐘','🦚','🌸','⭐','🪔','🦋','🐸','🎈','🍪','🚗','🎠','🐧','🌙'];
const HINDI_NUMS = ['शून्य','एक','दो','तीन','चार','पाँच','छः','सात','आठ','नौ','दस'];
const GUJARATI_NUMS = ['શૂન્ય','એક','બે','ત્રણ','ચાર','પાંચ','છ','સાત','આઠ','નવ','દસ'];

const TOTAL_ROUNDS = 12;
let round = 0, mistakes = 0, answered = false, correctAnswer = 0;
let currentPrompt = {};
let wrongStreak = 0;
let currentHintPrompt = {};

function hearAgain() { speak(currentPrompt); }

function onLanguageChange() { initGame(); }

function initGame() {
  round = 0; mistakes = 0; answered = false;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();
  nextRound();
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) { showCompletion('math', mistakes, TOTAL_ROUNDS); return; }
  answered = false;
  wrongStreak = 0;
  hideFeedback();
  updateProgress(round, TOTAL_ROUNDS);

  const emoji = MATH_OBJECTS[Math.floor(Math.random() * MATH_OBJECTS.length)];
  const modeRoll = Math.random();
  const mode = round < 4
    ? 'add'
    : (round < 8 ? (modeRoll < 0.65 ? 'add' : 'sub') : (modeRoll < 0.5 ? 'add' : (modeRoll < 0.85 ? 'sub' : 'double')));

  let a, b, op;
  if (mode === 'add') {
    const maxAdd = round < 4 ? 4 : 5;
    a = 1 + Math.floor(Math.random() * maxAdd);
    b = 1 + Math.floor(Math.random() * maxAdd);
    // Keep total ≤ 10
    if (a + b > 10) b = 10 - a;
    correctAnswer = a + b;
    op = '+';
  } else if (mode === 'sub') {
    const maxTop = round < 8 ? 7 : 9;
    a = 2 + Math.floor(Math.random() * maxTop);
    b = 1 + Math.floor(Math.random() * (a - 1));
    correctAnswer = a - b;
    op = '−';
  } else {
    a = 2 + Math.floor(Math.random() * 4); // 2-5
    b = 2;
    correctAnswer = a * b;
    op = '×';
  }

  const eq = document.getElementById('math-equation');
  const thirdGroup = mode === 'add'
    ? emoji.repeat(b)
    : (mode === 'sub'
        ? '<s style="opacity:.45">' + emoji.repeat(b) + '</s>'
        : emoji.repeat(a));

  eq.innerHTML = `
    <div class="math-group">${emoji.repeat(a)}</div>
    <div class="math-op">${op}</div>
    <div class="math-group">${thirdGroup}</div>
    <div class="math-eq">=</div>
    <div class="math-q">❓</div>
  `;

  document.getElementById('question-text').textContent =
    t({en: `Solve it! ${a} ${op} ${b} = ?`, hi: `${a} ${op} ${b} = ?`, gu: `${a} ${op} ${b} = ?`});

  if (mode === 'add') {
    currentPrompt = {
      en:  a + ' plus ' + b + ', how many?',
      hi: HINDI_NUMS[a] + ' और ' + HINDI_NUMS[b] + ', कितने हुए?',
      gu: GUJARATI_NUMS[a] + ' અને ' + GUJARATI_NUMS[b] + ', કેટલા થયા?'
    };
    currentHintPrompt = {
      en: 'Hint: count all objects together.',
      hi: 'संकेत: सब चीजें मिलाकर गिनो।',
      gu: 'ઈશારો: બધી વસ્તુઓ સાથે ગણી લો.'
    };
  } else if (mode === 'sub') {
    currentPrompt = {
      en:  a + ' minus ' + b + ', how many remain?',
      hi: HINDI_NUMS[a] + ' में से ' + HINDI_NUMS[b] + ' घटाओ, कितने बचे?',
      gu: GUJARATI_NUMS[a] + ' માંથી ' + GUJARATI_NUMS[b] + ' બાદ કરો, કેટલા બચ્યા?'
    };
    currentHintPrompt = {
      en: 'Hint: first count all, then remove the crossed ones.',
      hi: 'संकेत: पहले सब गिनो, फिर काटी हुई चीजें हटाओ।',
      gu: 'ઈશારો: પહેલા બધું ગણો, પછી કાપેલી વસ્તુઓ ઘટાડો.'
    };
  } else {
    currentPrompt = {
      en: `${a} times 2, how many total?`,
      hi: HINDI_NUMS[a] + ' का दो गुना, कितने हुए?',
      gu: GUJARATI_NUMS[a] + ' નો બે ગણો, કેટલા થયા?'
    };
    currentHintPrompt = {
      en: 'Hint: double means same group two times.',
      hi: 'संकेत: दो गुना मतलब वही समूह दो बार।',
      gu: 'ઈશારો: બે ગણો એટલે એજ સમૂહ બે વાર.'
    };
  }
  speak(currentPrompt);

  // Generate choices
  const wrong = new Set();
  while (wrong.size < 3) {
    let n = correctAnswer + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
    n = Math.max(0, Math.min(10, n));
    if (n !== correctAnswer) wrong.add(n);
  }
  const choices = shuffle([correctAnswer, ...wrong]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = n;
    btn.onclick = () => handleChoice(btn, n);
    grid.appendChild(btn);
  });
}

function handleChoice(btn, value) {
  if (answered) return;
  if (value === correctAnswer) {
    answered = true;
    wrongStreak = 0;
    btn.classList.add('correct');
    showFeedback(true);
    round++;
    setTimeout(() => { btn.classList.remove('correct'); nextRound(); }, 1500);
  } else {
    mistakes++;
    wrongStreak++;
    btn.classList.add('wrong');
    showFeedback(false);
    if (wrongStreak >= 2) speak(currentHintPrompt);
    setTimeout(() => btn.classList.remove('wrong'), 600);
  }
}

document.addEventListener('DOMContentLoaded', () => { initLanguageSelector(); initGame(); });
</script>
</body>
</html>
