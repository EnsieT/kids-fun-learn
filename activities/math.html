<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simple Math ➕ · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>➕ Simple Math</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/10</span>
</header>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="math-question">What is the answer?</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <div class="math-equation" id="math-equation"></div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="choices-grid" id="choices-grid"></div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const MATH_OBJECTS = ['🥭','🍌','🥥','🍐','🍎','🐘','🦚','🌸','⭐','🪔'];
const NUMS = {
  en: ['zero','one','two','three','four','five','six','seven','eight','nine','ten'],
  hi: ['शून्य','एक','दो','तीन','चार','पाँच','छः','सात','आठ','नौ','दस'],
  gu: ['શૂન્ય','એક','બે','ત્રણ','ચાર','પાંચ','છ','સાત','આઠ','નવ','દસ']
};

const TOTAL_ROUNDS = 10;
let round = 0, mistakes = 0, answered = false, correctAnswer = 0;
let currentA = 0, currentB = 0, currentIsAdd = true;

function buildSpeakPrompt() {
  if (currentIsAdd) {
    return {
      en: `${NUMS.en[currentA]} plus ${NUMS.en[currentB]}, how many?`,
      hi: `${NUMS.hi[currentA]} और ${NUMS.hi[currentB]}, कितने हुए?`,
      gu: `${NUMS.gu[currentA]} અને ${NUMS.gu[currentB]}, કેટલા થયા?`
    };
  } else {
    return {
      en: `${NUMS.en[currentA]} minus ${NUMS.en[currentB]}, how many left?`,
      hi: `${NUMS.hi[currentA]} में से ${NUMS.hi[currentB]} घटाओ, कितने बचे?`,
      gu: `${NUMS.gu[currentA]} માંથી ${NUMS.gu[currentB]} બાદ, કેટલા બચ્યા?`
    };
  }
}

function hearAgain() { speak(buildSpeakPrompt()); }

function onLanguageChange() {
  document.getElementById('math-question').textContent = t({
    en: 'What is the answer?',
    hi: 'जवाब क्या है?',
    gu: 'જવાબ શું છે?'
  });
  speak(buildSpeakPrompt());
}

function initGame() {
  round = 0; mistakes = 0; answered = false;
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();
  nextRound();
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) { showCompletion('math', mistakes, TOTAL_ROUNDS); return; }
  answered = false;
  hideFeedback();
  updateProgress(round, TOTAL_ROUNDS);

  const emoji = MATH_OBJECTS[Math.floor(Math.random() * MATH_OBJECTS.length)];
  currentIsAdd = Math.random() > 0.4;

  if (currentIsAdd) {
    currentA = 1 + Math.floor(Math.random() * 5);
    currentB = 1 + Math.floor(Math.random() * 5);
    if (currentA + currentB > 10) currentB = 10 - currentA;
    correctAnswer = currentA + currentB;
  } else {
    currentA = 2 + Math.floor(Math.random() * 8);
    currentB = 1 + Math.floor(Math.random() * (currentA - 1));
    correctAnswer = currentA - currentB;
  }

  const op = currentIsAdd ? '+' : '−';
  const eq = document.getElementById('math-equation');
  eq.innerHTML = `
    <div class="math-group">${emoji.repeat(currentA)}</div>
    <div class="math-op">${op}</div>
    <div class="math-group">${currentIsAdd ? emoji.repeat(currentB) : '<s style="opacity:.45">' + emoji.repeat(currentB) + '</s>'}</div>
    <div class="math-eq">=</div>
    <div class="math-q">❓</div>
  `;

  document.getElementById('math-question').textContent = t({
    en: `${currentA} ${op} ${currentB} = ?`,
    hi: `${currentA} ${op} ${currentB} = ?`,
    gu: `${currentA} ${op} ${currentB} = ?`
  });

  speak(buildSpeakPrompt());

  const wrong = new Set();
  while (wrong.size < 3) {
    let n = correctAnswer + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
    n = Math.max(0, Math.min(10, n));
    if (n !== correctAnswer) wrong.add(n);
  }
  const choices = shuffle([correctAnswer, ...wrong]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = n;
    btn.onclick = () => handleChoice(btn, n);
    grid.appendChild(btn);
  });
}

function handleChoice(btn, value) {
  if (answered) return;
  if (value === correctAnswer) {
    answered = true;
    btn.classList.add('correct');
    showFeedback(true);
    round++;
    setTimeout(() => { btn.classList.remove('correct'); nextRound(); }, 1500);
  } else {
    mistakes++;
    btn.classList.add('wrong');
    showFeedback(false);
    setTimeout(() => btn.classList.remove('wrong'), 600);
  }
}

document.addEventListener('DOMContentLoaded', () => { injectLanguageSelector(); initGame(); });
</script>
</body>
</html>
