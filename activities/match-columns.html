<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Match Columns 🔗 · Kids Fun Learn</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .match-wrap {
    padding: 12px 16px;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }
  .match-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    position: relative;
  }
  .match-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .match-col-label {
    text-align: center;
    font-weight: 900;
    font-size: 1rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .match-item {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    border: 4px solid transparent;
    transition: transform 0.15s, border-color 0.2s, background 0.2s;
    font-size: 2rem;
    min-height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    user-select: none;
  }
  .match-item:hover { transform: scale(1.06); }
  .match-item:active { transform: scale(0.95); }
  .match-item.selected  { border-color: #2196F3; background: #E3F2FD; }
  .match-item.matched   { border-color: #4CAF50; background: #E8F5E9; opacity: 0.75; cursor: default; transform: none; }
  .match-item.wrong     { border-color: #F44336; background: #FFEBEE; animation: shake 0.5s; }
  .match-item-label { font-size: 0.75rem; font-weight: 800; color: #555; }

  /* SVG connector overlay */
  #connector-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
    overflow: visible;
  }

  .round-type-badge {
    text-align: center;
    padding: 6px 16px;
    background: linear-gradient(135deg, #FF8C00, #FFD700);
    color: #fff;
    font-weight: 900;
    font-size: 1rem;
    border-radius: 50px;
    display: inline-block;
    margin: 8px auto;
    display: flex;
    justify-content: center;
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<header class="activity-header">
  <button class="back-btn" onclick="goHome()" aria-label="Go Home">🏠</button>
  <h1>🔗 Match Columns</h1>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <span class="score-display" id="score-display">0/8</span>
</header>

<div id="game-area">
  <div class="question-area">
    <p class="question-text" id="match-question">Match them!</p>
    <button class="hear-btn" onclick="hearAgain()" aria-label="आवाज़ सुनो">🔊</button>
  </div>

  <div style="display:flex;justify-content:center;">
    <div class="round-type-badge" id="round-badge">🐄 जानवर और आवाज़</div>
  </div>

  <div id="feedback-banner" class="feedback-banner"></div>

  <div class="match-wrap">
    <div class="match-columns" id="match-columns">
      <svg id="connector-svg"></svg>
      <div class="match-col" id="left-col">
        <div class="match-col-label" id="left-col-label">👈</div>
      </div>
      <div class="match-col" id="right-col">
        <div class="match-col-label" id="right-col-label">👉</div>
      </div>
    </div>
  </div>
</div>

<div id="completion-screen" class="completion-screen">
  <div class="completion-stars" id="completion-stars"></div>
  <div class="completion-title" id="completion-title"></div>
  <div class="completion-score" id="completion-score"></div>
  <div class="completion-best"  id="completion-best"></div>
  <button class="play-again-btn" onclick="initGame()">🔄 Play Again</button>
</div>

<script src="../js/common.js"></script>
<script>
const ROUND_TYPES = [
  {
    title: {en: '🐄 Animals & Sounds', hi: '🐄 जानवर और आवाज़', gu: '🐄 પ્રાણી અને અવાજ'},
    pairs: [
      {left:{emoji:'🐄',en:'Cow',hi:'गाय',gu:'ગાય'},         right:{emoji:'🐮',en:'Moo',hi:'मू',gu:'બા'}},
      {left:{emoji:'🐕',en:'Dog',hi:'कुत्ता',gu:'કૂતરો'},    right:{emoji:'🔔',en:'Woof',hi:'भौं भौं',gu:'ભૌ ભૌ'}},
      {left:{emoji:'🐈',en:'Cat',hi:'बिल्ली',gu:'બિલાડી'},   right:{emoji:'🎵',en:'Meow',hi:'म्याऊं',gu:'મ્યાઉ'}},
      {left:{emoji:'🦁',en:'Lion',hi:'शेर',gu:'સિંહ'},        right:{emoji:'💥',en:'Roar',hi:'दहाड़',gu:'ત્રાડ'}},
      {left:{emoji:'🐘',en:'Elephant',hi:'हाथी',gu:'હાથી'},  right:{emoji:'📢',en:'Trumpet',hi:'चिंघाड़',gu:'ચિંઘાડ'}},
    ]
  },
  {
    title: {en: '🥭 Fruits & Colors', hi: '🥭 फल और रंग', gu: '🥭 ફળ અને રંગ'},
    pairs: [
      {left:{emoji:'🥭',en:'Mango',hi:'आम',gu:'કેરી'},        right:{emoji:'🟡',en:'Yellow',hi:'पीला',gu:'પીળો'}},
      {left:{emoji:'🍎',en:'Apple',hi:'सेब',gu:'સફરજન'},      right:{emoji:'🔴',en:'Red',hi:'लाल',gu:'લાલ'}},
      {left:{emoji:'🍌',en:'Banana',hi:'केला',gu:'કેળું'},    right:{emoji:'🟡',en:'Yellow',hi:'पीला',gu:'પીળો'}},
      {left:{emoji:'🍊',en:'Orange',hi:'संतरा',gu:'નારંગી'},  right:{emoji:'🟠',en:'Orange',hi:'नारंगी',gu:'નારંગી'}},
      {left:{emoji:'🍇',en:'Grapes',hi:'अंगूर',gu:'દ્રાક્ષ'},right:{emoji:'🟣',en:'Purple',hi:'बैंगनी',gu:'જાંબલો'}},
    ]
  },
  {
    title: {en: '🔢 Numbers & Dots', hi: '🔢 संख्या और बिंदु', gu: '🔢 સંખ્યા અને બિંદુ'},
    pairs: [
      {left:{emoji:'1️⃣',en:'One',hi:'एक',gu:'એક'},    right:{emoji:'⚫',en:'1 dot',hi:'एक बिंदु',gu:'1 બિંદુ'}},
      {left:{emoji:'2️⃣',en:'Two',hi:'दो',gu:'બે'},    right:{emoji:'⚫⚫',en:'2 dots',hi:'दो बिंदु',gu:'2 બિંદુ'}},
      {left:{emoji:'3️⃣',en:'Three',hi:'तीन',gu:'ત્રણ'},right:{emoji:'⚫⚫⚫',en:'3 dots',hi:'तीन बिंदु',gu:'3 બિંદુ'}},
      {left:{emoji:'4️⃣',en:'Four',hi:'चार',gu:'ચાર'}, right:{emoji:'⚫⚫⚫⚫',en:'4 dots',hi:'चार बिंदु',gu:'4 બિંદુ'}},
      {left:{emoji:'5️⃣',en:'Five',hi:'पाँच',gu:'પાંચ'},right:{emoji:'⚫⚫⚫⚫⚫',en:'5 dots',hi:'पाँच बिंदु',gu:'5 બિંદુ'}},
    ]
  },
  {
    title: {en: '🌍 Things & Categories', hi: '🌍 चीज़ें और श्रेणी', gu: '🌍 વસ્તુ અને વર્ગ'},
    pairs: [
      {left:{emoji:'🥭',en:'Mango',hi:'आम',gu:'કેરી'},      right:{emoji:'🍽️',en:'Fruit',hi:'फल',gu:'ફળ'}},
      {left:{emoji:'🥔',en:'Potato',hi:'आलू',gu:'બટાકા'},   right:{emoji:'🥗',en:'Veggie',hi:'सब्ज़ी',gu:'શાકભાજી'}},
      {left:{emoji:'🐄',en:'Cow',hi:'गाय',gu:'ગાય'},         right:{emoji:'🐾',en:'Animal',hi:'जानवर',gu:'પ્રાણી'}},
      {left:{emoji:'🚗',en:'Car',hi:'कार',gu:'કાર'},          right:{emoji:'🛣️',en:'Vehicle',hi:'वाहन',gu:'વાહન'}},
      {left:{emoji:'📚',en:'Book',hi:'किताब',gu:'પુસ્તક'},   right:{emoji:'✏️',en:'Study',hi:'पढ़ाई',gu:'અભ્યાસ'}},
    ]
  },
];

const TOTAL_ROUNDS = 8;
let round = 0, mistakes = 0;
let roundsQueue = [];
let selectedLeft = null;
let matchedPairs = 0;
let totalPairs = 0;
let currentPairs = [];

function getPrompt() {
  return t({en: 'Match them!', hi: 'मिलाओ!', gu: 'મેળવો!'});
}
function hearAgain() {
  speak({en: 'Match them!', hi: 'मिलाओ!', gu: 'મેળવો!'});
}

function onLanguageChange() {
  document.getElementById('match-question').textContent = getPrompt();
  document.getElementById('left-col-label').textContent = '👈 ' + t({en: 'These', hi: 'इन्हें', gu: 'આ'});
  document.getElementById('right-col-label').textContent = '👉 ' + t({en: 'Match with', hi: 'इनसे मिलाओ', gu: 'સાથે મેળવો'});
  // Update round badge
  if (roundsQueue[round]) {
    document.getElementById('round-badge').textContent = t(roundsQueue[round].title);
  }
  // Update item labels
  document.querySelectorAll('#left-col .match-item, #right-col .match-item').forEach(el => {
    const en = el.dataset.en;
    const hi = el.dataset.hi;
    const gu = el.dataset.gu;
    if (en && hi && gu) {
      const lbl = el.querySelector('.match-item-label');
      if (lbl) lbl.textContent = t({en, hi, gu});
    }
  });
  speak({en: 'Match them!', hi: 'मिलाओ!', gu: 'મેળવો!'});
}

function initGame() {
  round = 0; mistakes = 0; selectedLeft = null;
  roundsQueue = [];
  const types = shuffle([...ROUND_TYPES]);
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    roundsQueue.push(types[i % types.length]);
  }
  document.getElementById('completion-screen').classList.remove('show');
  document.getElementById('game-area').classList.remove('hidden');
  hideFeedback();
  nextRound();
}

function nextRound() {
  if (round >= TOTAL_ROUNDS) {
    showCompletion('match-columns', mistakes, TOTAL_ROUNDS);
    return;
  }
  selectedLeft = null;
  matchedPairs = 0;
  hideFeedback();
  updateProgress(round, TOTAL_ROUNDS);

  const rt = roundsQueue[round];
  document.getElementById('round-badge').textContent = t(rt.title);
  document.getElementById('match-question').textContent = getPrompt();
  document.getElementById('left-col-label').textContent = '👈 ' + t({en: 'These', hi: 'इन्हें', gu: 'આ'});
  document.getElementById('right-col-label').textContent = '👉 ' + t({en: 'Match with', hi: 'इनसे मिलाओ', gu: 'સાથે મેળવો'});

  currentPairs = shuffle([...rt.pairs]).slice(0, 4);
  totalPairs = currentPairs.length;

  const leftItems  = currentPairs.map(p => p.left);
  const rightItems = shuffle(currentPairs.map(p => p.right));

  document.getElementById('connector-svg').innerHTML = '';

  renderColumn('left-col',  leftItems,  true);
  renderColumn('right-col', rightItems, false);

  speak({en: 'Match them!', hi: 'मिलाओ!', gu: 'મેળવો!'});
}

function renderColumn(colId, items, isLeft) {
  const col = document.getElementById(colId);
  const label = col.querySelector('.match-col-label');
  col.innerHTML = '';
  col.appendChild(label);

  items.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'match-item';
    div.dataset.emoji = item.emoji;
    div.dataset.en = item.en;
    div.dataset.hi = item.hi;
    div.dataset.gu = item.gu || item.en;
    div.innerHTML = `<span>${item.emoji}</span><span class="match-item-label">${t(item)}</span>`;
    div.onclick = () => isLeft ? handleLeftTap(div) : handleRightTap(div);
    col.appendChild(div);
  });
}

function handleLeftTap(el) {
  if (el.classList.contains('matched')) return;
  document.querySelectorAll('#left-col .match-item.selected')
    .forEach(e => e.classList.remove('selected'));
  selectedLeft = el;
  el.classList.add('selected');
  speak({en: el.dataset.en, hi: el.dataset.hi, gu: el.dataset.gu || el.dataset.en});
  hideFeedback();
}

function handleRightTap(el) {
  if (!selectedLeft) {
    speak({en: 'Pick from the left first!', hi: 'पहले बाईं तरफ से चुनो!', gu: 'પ્રથમ ડાબી તરફથી પસંદ કરો!'});
    return;
  }
  if (el.classList.contains('matched')) return;

  const leftEmoji = selectedLeft.dataset.emoji;
  const pair = currentPairs.find(p => p.left.emoji === leftEmoji);
  const correctEn = pair ? pair.right.en : null;

  if (el.dataset.en === correctEn) {
    el.classList.add('matched');
    selectedLeft.classList.remove('selected');
    selectedLeft.classList.add('matched');
    drawConnector(selectedLeft, el);
    selectedLeft = null;
    matchedPairs++;
    showFeedback(true);
    speak({en: 'Correct!', hi: 'सही!', gu: 'સાચું!'});
    if (matchedPairs >= totalPairs) {
      round++;
      setTimeout(() => { hideFeedback(); nextRound(); }, 1600);
    }
  } else {
    mistakes++;
    el.classList.add('wrong');
    showFeedback(false);
    setTimeout(() => el.classList.remove('wrong'), 600);
  }
}

function drawConnector(leftEl, rightEl) {
  const svg = document.getElementById('connector-svg');
  const container = document.getElementById('match-columns');
  const cr  = container.getBoundingClientRect();
  const lr  = leftEl.getBoundingClientRect();
  const rr  = rightEl.getBoundingClientRect();

  const x1 = lr.right  - cr.left;
  const y1 = lr.top + lr.height / 2 - cr.top;
  const x2 = rr.left   - cr.left;
  const y2 = rr.top + rr.height / 2 - cr.top;

  const colors = ['#4CAF50','#2196F3','#FF8C00','#9C27B0','#F44336'];
  const color  = colors[matchedPairs % colors.length];

  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '5');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('opacity', '0.75');
  svg.appendChild(line);
}

document.addEventListener('DOMContentLoaded', () => { injectLanguageSelector(); initGame(); });
</script>
</body>
</html>
